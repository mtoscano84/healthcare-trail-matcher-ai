apiVersion: batch/v1
kind: Job
metadata:
  name: data-loader
  namespace: data
spec:
  template:
    spec:
      containers:
      - name: loader
        image: postgres:15
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for database to be ready..."
          until pg_isready -h al-healthcare-db-rw-ilb -U postgres; do
            sleep 5
          done
          
          echo "Database is ready. Creating database healthcaredb if it doesn't exist..."
          # Check if database exists
          RESULT=$(PGPASSWORD=alloydb psql -h al-healthcare-db-rw-ilb -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='healthcaredb'")
          if [ "$RESULT" != "1" ]; then
            PGPASSWORD=alloydb psql -h al-healthcare-db-rw-ilb -U postgres -c "CREATE DATABASE healthcaredb;"
          fi
          
          echo "Creating tables and loading data in healthcaredb..."
          PGPASSWORD=alloydb psql -h al-healthcare-db-rw-ilb -U postgres -d healthcaredb -c "
          CREATE TABLE IF NOT EXISTS patients (
              patient_id VARCHAR(50) PRIMARY KEY,
              name VARCHAR(100),
              age INT,
              gender VARCHAR(10),
              zip_code VARCHAR(10),
              description TEXT
          );
          CREATE TABLE IF NOT EXISTS diagnoses (
              diagnosis_id VARCHAR(50) PRIMARY KEY,
              patient_id VARCHAR(50) REFERENCES patients(patient_id),
              condition VARCHAR(100),
              date DATE,
              description TEXT
          );
          CREATE TABLE IF NOT EXISTS medications (
              medication_id VARCHAR(50) PRIMARY KEY,
              patient_id VARCHAR(50) REFERENCES patients(patient_id),
              medication VARCHAR(100),
              dosage VARCHAR(50),
              description TEXT
          );
          "
          
          # Copy data from mounted volume
          PGPASSWORD=alloydb psql -h al-healthcare-db-rw-ilb -U postgres -d healthcaredb -c "\copy patients FROM '/data/patients.csv' WITH CSV HEADER;"
          PGPASSWORD=alloydb psql -h al-healthcare-db-rw-ilb -U postgres -d healthcaredb -c "\copy diagnoses FROM '/data/diagnoses.csv' WITH CSV HEADER;"
          PGPASSWORD=alloydb psql -h al-healthcare-db-rw-ilb -U postgres -d healthcaredb -c "\copy medications FROM '/data/medications.csv' WITH CSV HEADER;"
          
          echo "Data loaded successfully."
        env:
        - name: PGPASSWORD
          value: "alloydb"
        volumeMounts:
        - name: data-volume
          mountPath: /data
      volumes:
      - name: data-volume
        configMap:
          name: clinical-data
      restartPolicy: OnFailure
  backoffLimit: 4
